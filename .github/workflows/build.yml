name: Build & Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Plugin
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.GenreRecommendations/Jellyfin.Plugin.GenreRecommendations.csproj

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.GenreRecommendations/Jellyfin.Plugin.GenreRecommendations.csproj \
            --configuration Release \
            --no-restore \
            --output ./build-output

      - name: Package as ZIP
        run: |
          REF_NAME="${{ github.ref_name }}"

          # Version extrahieren: bei Tags "v1.0.0" -> "1.0.0", sonst aus csproj
          if [[ "$REF_NAME" =~ ^v[0-9] ]]; then
            # Tag-basiertes Release (z.B. v1.0.0)
            VERSION="${REF_NAME#v}"
          else
            # Branch-basiertes Build - Version aus .csproj lesen
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' Jellyfin.Plugin.GenreRecommendations/Jellyfin.Plugin.GenreRecommendations.csproj | head -1)
          fi

          mkdir -p ./dist
          ZIP_NAME="jellyfin-plugin-genrerecommendations_${VERSION}.zip"

          cd build-output
          zip -j "../dist/${ZIP_NAME}" Jellyfin.Plugin.GenreRecommendations.dll
          cd ..

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

          echo "✓ Paket erstellt: dist/${ZIP_NAME}"
          ls -lh dist/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: dist/*.zip
          retention-days: 30

      # Nur bei einem versionierten Tag ein GitHub Release erstellen
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ env.VERSION }}"
          ZIP_FILE="./dist/jellyfin-plugin-genrerecommendations_${VERSION}.zip"
          TAG="v${VERSION}"

          # Altes Release löschen falls es existiert
          gh release delete "${TAG}" -y 2>/dev/null || true

          # Neues Release erstellen
          gh release create "${TAG}" \
            --title "Genre Recommendations v${VERSION}" \
            --notes "## Installation

1. ZIP-Datei herunterladen
2. ZIP in den Jellyfin Plugin-Ordner entpacken:
   - Linux: \`~/.local/share/jellyfin/plugins/\`
   - Windows: \`%APPDATA%\\jellyfin\\plugins\\\`
   - Docker: \`/config/plugins/\`
3. Jellyfin neu starten
4. Plugin unter **Dashboard → Plugins → Genre Recommendations** konfigurieren" \
            "${ZIP_FILE}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
