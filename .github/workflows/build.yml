name: Build & Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Plugin
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.GenreRecommendations/Jellyfin.Plugin.GenreRecommendations.csproj

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.GenreRecommendations/Jellyfin.Plugin.GenreRecommendations.csproj \
            --configuration Release \
            --no-restore \
            --output ./build-output

      - name: Package as ZIP
        run: |
          REF_NAME="${{ github.ref_name }}"

          if [[ "$REF_NAME" =~ ^v[0-9] ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' Jellyfin.Plugin.GenreRecommendations/Jellyfin.Plugin.GenreRecommendations.csproj | head -1)
          fi

          mkdir -p ./dist
          ZIP_NAME="jellyfin-plugin-genrerecommendations_${VERSION}.zip"

          cd build-output
          zip -j "../dist/${ZIP_NAME}" Jellyfin.Plugin.GenreRecommendations.dll
          cd ..

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

          echo "✓ Paket erstellt: dist/${ZIP_NAME}"
          ls -lh dist/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: dist/*.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: |
            ## Installation

            1. ZIP-Datei herunterladen
            2. ZIP in den Jellyfin Plugin-Ordner entpacken:
               - Linux: `~/.local/share/jellyfin/plugins/`
               - Windows: `%APPDATA%\jellyfin\plugins\`
               - Docker: `/config/plugins/`
            3. Jellyfin neu starten
            4. Plugin unter **Dashboard → Plugins → Genre Recommendations** konfigurieren
        run: |
          VERSION="${{ env.VERSION }}"
          ZIP_FILE="./dist/jellyfin-plugin-genrerecommendations_${VERSION}.zip"
          TAG="v${VERSION}"

          # Altes Release löschen falls es existiert
          gh release delete "${TAG}" -y 2>/dev/null || true

          # Release erstellen
          gh release create "${TAG}" \
            --title "Genre Recommendations v${VERSION}" \
            --notes "$RELEASE_NOTES"

          # ZIP als Asset hochladen
          gh release upload "${TAG}" "${ZIP_FILE}" --clobber

      - name: Update Manifest
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          export CHECKSUM=$(md5sum "./dist/jellyfin-plugin-genrerecommendations_${{ env.VERSION }}.zip" | awk '{print $1}')
          export TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export SOURCE_URL="https://github.com/${REPO}/releases/download/${TAG}/jellyfin-plugin-genrerecommendations_${{ env.VERSION }}.zip"
          export MANIFEST_VERSION=$(echo "${{ env.VERSION }}" | awk -F. 'NF==3{print $0".0"} NF!=3{print $0}')
          python3 << 'PYEOF'
          import json, os
          version = os.environ["MANIFEST_VERSION"]
          checksum = os.environ["CHECKSUM"]
          source_url = os.environ["SOURCE_URL"]
          timestamp = os.environ["TIMESTAMP"]
          with open("manifest.json", "r") as f:
              manifest = json.load(f)
          new_version = {
              "version": version,
              "changelog": "",
              "targetAbi": "10.9.0.0",
              "sourceUrl": source_url,
              "checksum": checksum,
              "timestamp": timestamp,
          }
          manifest[0]["versions"] = [v for v in manifest[0]["versions"] if v["version"] != version]
          manifest[0]["versions"].insert(0, new_version)
          with open("manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PYEOF

      - name: Commit Manifest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "chore: update manifest for ${{ github.ref_name }}"
          git push origin HEAD:master
